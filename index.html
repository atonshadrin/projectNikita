<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор — Проект Никиты</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <h1>Калькулятор</h1>
    <div class="display">
      <div id="expression" class="expression"></div>
      <div id="result" class="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn btn-clear span2" data-action="clear">AC</button>
      <button class="btn btn-clear" data-action="delete">⌫</button>
      <button class="btn btn-operator" data-value="%">%</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn btn-operator" data-value="/">÷</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn btn-operator" data-value="*">×</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn btn-operator" data-value="-">−</button>

      <button class="btn span2" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
      <button class="btn btn-operator" data-value="+">+</button>

      <button class="btn btn-equals span4" data-action="calculate">=</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
