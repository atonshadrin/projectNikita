{% extends 'base.html' %}
{% block title %}Регистрация — NewsPortal{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-bolt auth-logo-icon"></i>
            <h2>Регистрация</h2>
            <p>Создайте аккаунт и присоединяйтесь!</p>
        </div>
        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Имя пользователя</label>
                <input type="text" id="username" name="username" required placeholder="Ваш никнейм" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                <div class="input-password">
                    <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="new-password">
                    <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label for="password2"><i class="fas fa-lock"></i> Повторите пароль</label>
                <div class="input-password">
                    <input type="password" id="password2" name="password2" required placeholder="••••••••" autocomplete="new-password">
                    <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>
        </form>
        <div class="auth-footer">
            <p>Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a></p>
        </div>
    </div>
</div>
{% endblock %}
