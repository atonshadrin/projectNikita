{% extends 'base.html' %}
{% block title %}Войти — NewsPortal{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-bolt auth-logo-icon"></i>
            <h2>Вход в систему</h2>
            <p>Добро пожаловать обратно!</p>
        </div>
        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                <div class="input-password">
                    <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="form-check">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Запомнить меня</label>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
        </form>
        <div class="auth-footer">
            <p>Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрироваться</a></p>
        </div>
    </div>
</div>
{% endblock %}
